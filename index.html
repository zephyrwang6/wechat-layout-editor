<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>公众号排版编辑器</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="workspace-panel input-panel">
        <section class="brand-block">
          <div class="brand-mark">排</div>
          <div>
            <p class="eyebrow">WeChat Rich Text Lab</p>
            <h1>公众号排版编辑器</h1>
          </div>
        </section>

        <section class="field-stack">
          <div class="field-head">
            <label for="articleTitle">标题</label>
            <button class="ghost-button" id="loadSampleButton" type="button">载入示例</button>
          </div>
          <input id="articleTitle" class="title-input" value="AI 学习资料最权威的入口，其实就在御三家官网" />
        </section>

        <section class="field-stack grow">
          <div class="field-head">
            <label for="articleInput">正文</label>
            <span id="articleStats">0 字</span>
          </div>
          <textarea id="articleInput" spellcheck="false"></textarea>
        </section>

        <section class="theme-section">
          <div class="field-head">
            <label>排版主题</label>
            <span>点击切换</span>
          </div>
          <div class="theme-grid" id="themeGrid"></div>
        </section>
      </aside>

      <section class="workspace-panel preview-panel">
        <section class="toolbar">
          <div>
            <p class="eyebrow">Live Preview</p>
            <h2 id="activeThemeName">文档树</h2>
          </div>
          <div class="toolbar-actions">
            <button class="secondary-button" id="copyHtmlButton" type="button">复制源码</button>
            <button class="primary-button" id="copyRichButton" type="button">复制到公众号</button>
          </div>
        </section>

        <section class="notice-line" id="copyStatus">
          复制到公众号会写入 text/html 富文本，粘贴到草稿箱正文区域即可保留样式。
        </section>

        <section class="preview-frame">
          <div id="wechatPreview"></div>
        </section>
      </section>
    </main>

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
